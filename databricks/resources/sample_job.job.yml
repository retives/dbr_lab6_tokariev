# A sample job for lab6_pipeline.

resources:
  jobs:
    sample_job:
      name: sample_job

      trigger:
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.lab6_pipeline_etl.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
