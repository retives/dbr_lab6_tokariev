# The main pipeline for lab6_pipeline

resources:
  pipelines:
    lab6_pipeline_etl:
      name: lab6_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/lab6_pipeline_etl"

      libraries:
        - glob:
            include: ../src/lab6_pipeline_etl/transformations/**

      environment:
        dependencies:
          - --editable ${workspace.file_path}
          - kagglehub
      clusters:
        - label: default
          node_type_id: "Standard_F4"
          num_workers: 0
          spark_conf:
            spark.databricks.cluster.profile: singleNode
            spark.master: "local[*]"
            spark.databricks.delta.preview.enabled: "true"
          custom_tags:
            ResourceClass: SingleNode
 
